[flake8]

# E302 - Two blank lines after a function.
# E306 - Unexpected blank line before a nested definition.
# E731 - Do not assign a lambda expression.
# W503 - Line break before binary operator (conflicts with W504, formatter preference).
# E704 - Statement on same line as def (used for single-line stubs/protocols).
ignore = E731, E302, E306, W503, E704
max-line-length = 160

[coverage:run]
branch = True
source = farmfs
parallel = True

[coverage:paths]
source =
    .
    */site-packages
